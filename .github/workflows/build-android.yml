name: 🤖 Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: 🏗️ Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🎨 Copy app icons
        run: |
          # Copy custom icons to Android res folders
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
            if [ -f "android/app/src/main/res/mipmap-${density}/ic_launcher.png" ]; then
              echo "Icon already exists for ${density}"
            fi
          done

      - name: 🛡️ Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: 📋 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cafe-pos-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release build (chỉ khi có tag v*) ──────────────────────────────
      - name: 🔑 Decode Keystore (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/cafe-pos.keystore

      - name: 🏭 Build Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/cafe-pos.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: 📦 Upload Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: cafe-pos-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          name: "POS Cafe ${{ github.ref_name }}"
          body: |
            ## ☕ POS Quán Cafe ${{ github.ref_name }}
            
            ### 📱 Tải về
            - **APK Release** (khuyên dùng): `app-release.apk`
            - **APK Debug**: `app-debug.apk`
            
            ### 📋 Hướng dẫn cài trên Android
            1. Tải file `app-release.apk`
            2. Vào Settings → Security → Cho phép cài từ nguồn không rõ
            3. Mở file APK và cài đặt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
